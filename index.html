<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私募基金合规知识测试 - 题库版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e7f1 100%);
            color: #333;
            line-height: 1.6;
            padding: 15px;
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px 0;
            border-bottom: 1px solid #e1e4e8;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            border-radius: 12px;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }
        
        header:before {
            content: "";
            position: absolute;
            top: -40px;
            right: -40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        header:after {
            content: "";
            position: absolute;
            bottom: -25px;
            left: -25px;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            position: relative;
            z-index: 2;
            margin-bottom: 8px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0 0;
            position: relative;
            z-index: 2;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .stat-label {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #e1e4e8;
        }
        
        .container:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        #start-container {
            text-align: center;
            padding: 25px 20px;
        }
        
        #question-container {
            display: none;
        }
        
        #result-container {
            display: none;
        }
        
        .welcome-title {
            color: #1a365d;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }
        
        .welcome-text {
            margin-bottom: 20px;
            color: #4a5568;
            line-height: 1.7;
            font-size: 1.05rem;
        }
        
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
        }
        
        .feature-card {
            flex: 1;
            min-width: 180px;
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .feature-card:hover {
            background: #edf2f7;
            transform: translateY(-3px);
        }
        
        .feature-icon {
            font-size: 2.2rem;
            margin-bottom: 12px;
            color: #2b6cb0;
        }
        
        .feature-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #2d3748;
            font-size: 1.05rem;
        }
        
        .feature-desc {
            color: #718096;
            font-size: 0.9rem;
        }
        
        .question {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
            padding: 18px;
            background: #f8fafc;
            border-radius: 10px;
            border-left: 4px solid #4299e1;
            position: relative;
        }
        
        .question-number {
            position: absolute;
            top: 8px;
            right: 12px;
            background: #4299e1;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
        }
        
        .options {
            margin-bottom: 25px;
        }
        
        .option {
            display: flex;
            align-items: center;
            padding: 14px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border: 1px solid #e1e4e8;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .option:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #cbd5e0;
            transition: width 0.3s ease;
        }
        
        .option:hover {
            background: #e9ecef;
            transform: translateX(6px);
        }
        
        .option:hover:before {
            width: 6px;
            background: #4299e1;
        }
        
        .option.selected {
            background: #e3f2fd;
            border-color: #90caf9;
            font-weight: 500;
            transform: translateX(6px);
        }
        
        .option.selected:before {
            width: 6px;
            background: #3182ce;
        }
        
        .option-letter {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .option.selected .option-letter {
            background: #3182ce;
            color: white;
        }
        
        .progress-container {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            flex-grow: 1;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin: 0 12px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4299e1, #3182ce);
            border-radius: 5px;
            transition: width 0.5s ease;
            width: 0%;
        }
        
        .progress-text {
            text-align: center;
            color: #4a5568;
            font-size: 0.95rem;
            min-width: 90px;
            font-weight: 500;
        }
        
        .btn-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            display: block;
            padding: 14px 22px;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 140px;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        
        .btn:after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.1);
            transform: rotate(30deg);
            transition: all 0.5s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }
        
        .btn:hover:after {
            transform: rotate(30deg) translate(10%, 10%);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn:disabled:after {
            display: none;
        }
        
        .btn.secondary {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: #1a365d;
            border: 1px solid #cbd5e1;
        }
        
        .btn.secondary:hover {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%);
        }
        
        .result-header {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            position: relative;
        }
        
        .result-header:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, #4299e1, #3182ce);
            border-radius: 2px;
        }
        
        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0 auto 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        
        .result-feedback {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #2d3748;
            padding: 15px;
            background: #f7fafc;
            border-radius: 10px;
            border-left: 4px solid #48bb78;
            font-weight: 500;
        }
        
        .result-details {
            display: flex;
            justify-content: space-around;
            background: #f7fafc;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
        }
        
        .detail-item {
            flex: 1;
        }
        
        .detail-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a365d;
        }
        
        .detail-label {
            font-size: 0.95rem;
            color: #718096;
        }
        
        .review-section-title {
            text-align: center;
            margin: 20px 0 15px;
            color: #2d3748;
            font-size: 1.4rem;
            position: relative;
            padding-bottom: 12px;
        }
        
        .review-section-title:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #4299e1, #3182ce);
            border-radius: 2px;
        }
        
        .review-item {
            padding: 18px;
            margin-bottom: 18px;
            border-radius: 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .review-item:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #e2e8f0;
            border-radius: 4px 0 0 4px;
        }
        
        .review-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.08);
        }
        
        .review-question {
            font-weight: 500;
            margin-bottom: 12px;
            color: #2d3748;
            font-size: 1.1rem;
            display: flex;
            align-items: flex-start;
        }
        
        .review-question-num {
            background: #4299e1;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            flex-shrink: 0;
            font-size: 0.85rem;
        }
        
        .review-answer {
            margin: 12px 0;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            font-size: 1rem;
        }
        
        .review-answer:before {
            content: '•';
            margin-right: 8px;
            font-size: 1.6rem;
        }
        
        .correct {
            background: #f0fff4;
            border-left: 3px solid #48bb78;
        }
        
        .incorrect {
            background: #fff5f5;
            border-left: 3px solid #f56565;
        }
        
        .review-explanation {
            background: #ebf8ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95rem;
            color: #2d3748;
            border-left: 3px solid #4299e1;
        }
        
        .review-explanation h4 {
            color: #2b6cb0;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        footer {
            text-align: center;
            color: #718096;
            font-size: 0.85rem;
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            border-top: 1px solid #e2e8f0;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 15px;
                margin-bottom: 15px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .question {
                font-size: 1.1rem;
                padding: 15px;
                margin-bottom: 15px;
            }
            
            .btn {
                flex: 100%;
                margin-top: 8px;
                padding: 12px;
                font-size: 0.95rem;
            }
            
            .btn-container {
                flex-direction: column;
                gap: 8px;
            }
            
            .features {
                flex-direction: column;
                gap: 12px;
            }
            
            .feature-card {
                min-width: auto;
                padding: 12px;
            }
            
            .welcome-title {
                font-size: 1.4rem;
                margin-bottom: 12px;
            }
            
            .welcome-text {
                font-size: 0.95rem;
                margin-bottom: 15px;
            }
            
            .result-feedback {
                font-size: 1.1rem;
                padding: 12px;
                margin-bottom: 15px;
            }
            
            .review-section-title {
                font-size: 1.3rem;
                margin: 15px 0 10px;
            }
            
            .review-item {
                padding: 15px;
                margin-bottom: 15px;
            }
            
            .review-question {
                font-size: 1.05rem;
            }
            
            .review-answer {
                font-size: 0.95rem;
            }
            
            .review-explanation {
                padding: 12px;
                margin-top: 12px;
            }
            
            .score-badge {
                width: 85px;
                height: 85px;
                font-size: 1.6rem;
            }
            
            .detail-value {
                font-size: 1.3rem;
            }
            
            .detail-label {
                font-size: 0.9rem;
            }
            
            footer {
                padding: 15px;
                margin-top: 20px;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <header>
        <h1>私募基金合规知识自测</h1>
        <div class="subtitle">专业题库版 - 每次测试随机抽取5道题目</div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="question-count">20</div>
                <div class="stat-label">总题目数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="test-count">5</div>
                <div class="stat-label">每次测试题数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="category-count">3</div>
                <div class="stat-label">知识分类</div>
            </div>
        </div>
    </header>
    
    <div class="container" id="start-container">
        <h2 class="welcome-title">私募基金合规知识测试</h2>
        <p class="welcome-text">
            本测试基于《私募投资基金监督管理暂行办法》等法规设计，涵盖募集行为、投资者适当性、信息披露等核心合规要点。
            每次测试将从题库中随机抽取5道题目。
        </p>
        
        <div class="features">
            <div class="feature-card fade-in" style="animation-delay: 0.1s">
                <div class="feature-icon">📚</div>
                <div class="feature-title">专业题库</div>
                <div class="feature-desc">精选题目，覆盖核心合规要点</div>
            </div>
            <div class="feature-card fade-in" style="animation-delay: 0.2s">
                <div class="feature-icon">🔄</div>
                <div class="feature-title">随机抽题</div>
                <div class="feature-desc">每次测试随机抽取5道不同题目</div>
            </div>
            <div class="feature-card fade-in" style="animation-delay: 0.3s">
                <div class="feature-icon">📊</div>
                <div class="feature-title">详细解析</div>
                <div class="feature-desc">提供法规依据和详细解析</div>
            </div>
        </div>
        
        <button id="start-btn" class="btn">开始测试</button>
    </div>
    
    <div class="container" id="question-container">
        <div class="question">
            <div class="question-number">1</div>
            <div id="question-text"></div>
        </div>
        
        <div class="options" id="options-list"></div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text" id="progress-text"></div>
        </div>
        
        <div class="btn-container">
            <button id="prev-btn" class="btn secondary">上一题</button>
            <button id="next-btn" class="btn">下一题</button>
            <button id="submit-btn" class="btn" style="display:none;">提交答卷</button>
        </div>
    </div>
    
    <div class="container" id="result-container">
        <div class="result-header">
            <h2>测试结果</h2>
            <div class="score-badge" id="score-badge">80</div>
        </div>
        
        <div class="result-feedback" id="result-feedback"></div>
        
        <div class="result-details">
            <div class="detail-item">
                <div class="detail-value" id="correct-count">4</div>
                <div class="detail-label">答对题数</div>
            </div>
            <div class="detail-item">
                <div class="detail-value" id="total-count">5</div>
                <div class="detail-label">总题数</div>
            </div>
            <div class="detail-item">
                <div class="detail-value" id="accuracy">80%</div>
                <div class="detail-label">正确率</div>
            </div>
        </div>
        
        <h3 class="review-section-title">题目解析</h3>
        <div id="review-section"></div>
        
        <button id="restart-btn" class="btn" style="margin-top: 20px;">重新测试</button>
    </div>
    
    <footer>
        <p>© 2025 | 普及行业知识，助力合规发展</p>
        <p>题目内容基于最新法律法规及行业实践，定期更新</p>
    </footer>
    
    <script>
        // 私募基金测试题库（200道题）
        const questionBank = [
            // 募集合规类
            {
                id: 1,
                question: "私募基金可以向以下哪类对象募集资金？",
                options: [
                    "A. 社会公众",
                    "B. 合格投资者",
                    "C. 任何个人或机构",
                    "D. 特定行业从业人员"
                ],
                correctIndex: 1,
                explanation: "【解析】根据《私募投资基金监督管理暂行办法》第十二条，私募基金的合格投资者是指具备相应风险识别能力和风险承担能力，投资于单只私募基金的金额不低于100万元且符合下列相关标准的单位和个人：（一）净资产不低于1000万元的单位；（二）金融资产不低于300万元或者最近三年年均收入不低于50万元的个人。私募基金只能向合格投资者募集。",
                category: "募集合规"
            },
            {
                id: 2,
                question: "私募基金募集过程中，以下哪种行为是被允许的？",
                options: [
                    "A. 通过报纸、广告等公开方式宣传",
                    "B. 向不特定对象发送产品介绍",
                    "C. 通过官方网站公开宣传基金管理人品牌",
                    "D. 承诺保本保收益"
                ],
                correctIndex: 2,
                explanation: "【解析】根据《私募投资基金募集行为管理办法》第二十四条，募集机构及其从业人员推介私募基金时，禁止有以下行为：（一）公开推介或者变相公开推介；（二）推介材料虚假记载、误导性陈述或者重大遗漏；（三）以任何方式承诺投资者资金不受损失，或者以任何方式承诺投资者最低收益，包括宣传'预期收益'、'预计收益'、'预测投资业绩'等相关内容；（四）夸大或者片面推介基金。其中，允许的是基金管理人品牌宣传，但不得涉及具体产品。",
                category: "募集合规"
            },
            {
                id: 3,
                question: "私募基金募集机构应当履行什么程序以确定投资者是否为合格投资者？",
                options: [
                    "A. 仅要求投资者自行承诺",
                    "B. 仅要求投资者提供资产证明",
                    "C. 进行风险测评和资产证明审核",
                    "D. 仅要求投资者填写调查问卷"

            resultContainer.style.display = 'none';
            
            // 渲染第一题
            renderQuestion();
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }
        
        // 从题库中随机选择题目
        function getRandomQuestions(count) {
            // 复制题库
            const shuffled = [...questionBank];
            // Fisher-Yates 洗牌算法
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            // 返回前count个题目
            return shuffled.slice(0, count);
        }
        
        // 渲染当前题目
        function renderQuestion() {
            const question = currentTestQuestions[currentQuestionIndex];
            
            // 显示题目
            questionText.textContent = question.question;
            document.querySelector('.question-number').textContent = currentQuestionIndex + 1;
            
            // 清空选项
            optionsList.innerHTML = '';
            
            // 添加选项
            question.options.forEach((option, index) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                if (userAnswers[currentQuestionIndex] === index) {
                    optionElement.classList.add('selected');
                }
                
                const optionLetter = document.createElement('div');
                optionLetter.className = 'option-letter';
                optionLetter.textContent = option.charAt(0); // A, B, C, D
                
                const optionText = document.createElement('div');
                optionText.textContent = option;
                
                optionElement.appendChild(optionLetter);
                optionElement.appendChild(optionText);
                optionElement.dataset.index = index;
                
                optionElement.addEventListener('click', () => {
                    // 移除所有选项的选中状态
                    document.querySelectorAll('.option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    
                    // 标记当前选中的选项
                    optionElement.classList.add('selected');
                    userAnswers[currentQuestionIndex] = index;
                    
                    // 自动进入下一题（如果是最后一题则显示提交按钮）
                    if (currentQuestionIndex < currentTestQuestions.length - 1) {
                        setTimeout(() => {
                            currentQuestionIndex++;
                            renderQuestion();
                        }, 300);
                    } else {
                        submitBtn.style.display = 'block';
                    }
                });
                
                optionsList.appendChild(optionElement);
            });
            
            // 更新进度
            const progressPercent = ((currentQuestionIndex + 1) / currentTestQuestions.length) * 100;
            progressText.textContent = `进度: ${currentQuestionIndex + 1}/${currentTestQuestions.length}`;
            progressFill.style.width = `${progressPercent}%`;
            
            // 更新按钮状态
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.style.display = currentQuestionIndex < currentTestQuestions.length - 1 ? 'block' : 'none';
            submitBtn.style.display = currentQuestionIndex === currentTestQuestions.length - 1 ? 'block' : 'none';
        }
        
        // 上一题
        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        });
        
        // 下一题
        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < currentTestQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            }
        });
        
        // 提交答卷
        submitBtn.addEventListener('click', showResults);
        
        // 显示结果
        function showResults() {
            // 计算得分
            let correctCount = 0;
            currentTestQuestions.forEach((question, index) => {
                if (userAnswers[index] === question.correctIndex) {
                    correctCount++;
                }
            });
            
            const score = Math.round((correctCount / currentTestQuestions.length) * 100);
            
            // 更新结果元素
            scoreBadge.textContent = score;
            correctCountEl.textContent = correctCount;
            totalCountEl.textContent = currentTestQuestions.length;
            accuracyEl.textContent = `${score}%`;
            
            // 显示评价
            if (score >= 90) {
                resultFeedback.textContent = "🎉 优秀！您对私募基金合规知识掌握得非常扎实！";
                scoreBadge.style.background = "linear-gradient(135deg, #48bb78 0%, #38a169 100%)";
            } else if (score >= 80) {
                resultFeedback.textContent = "👍 良好！您已经掌握了大部分私募基金合规要点！";
                scoreBadge.style.background = "linear-gradient(135deg, #4299e1 0%, #3182ce 100%)";
            } else if (score >= 70) {
                resultFeedback.textContent = "💪 不错！请继续加强私募基金合规知识的学习！";
                scoreBadge.style.background = "linear-gradient(135deg, #ed8936 0%, #dd6b20 100%)";
            } else if (score >= 60) {
                resultFeedback.textContent = "📚 及格！建议系统学习私募基金合规基础知识！";
                scoreBadge.style.background = "linear-gradient(135deg, #ecc94b 0%, #d69e2e 100%)";
            } else {
                resultFeedback.textContent = "📖 需要努力！私募基金合规知识对从业者至关重要，请认真学习！";
                scoreBadge.style.background = "linear-gradient(135deg, #f56565 0%, #e53e3e 100%)";
            }
            
            // 显示题目回顾
            reviewSection.innerHTML = '';
            currentTestQuestions.forEach((question, index) => {
                const reviewItem = document.createElement('div');
                reviewItem.className = 'review-item';
                
                // 问题
                const questionElement = document.createElement('div');
                questionElement.className = 'review-question';
                
                const questionNum = document.createElement('div');
                questionNum.className = 'review-question-num';
                questionNum.textContent = index + 1;
                
                const questionText = document.createElement('div');
                questionText.textContent = question.question;
                
                questionElement.appendChild(questionNum);
                questionElement.appendChild(questionText);
                reviewItem.appendChild(questionElement);
                
                // 用户答案
                const userAnswer = document.createElement('div');
                userAnswer.className = 'review-answer';
                
                if (userAnswers[index] !== null) {
                    const isCorrect = userAnswers[index] === question.correctIndex;
                    userAnswer.textContent = `您的答案: ${question.options[userAnswers[index]]}`;
                    userAnswer.classList.add(isCorrect ? 'correct' : 'incorrect');
                } else {
                    userAnswer.textContent = "您未回答此题";
                    userAnswer.classList.add('incorrect');
                }
                
                reviewItem.appendChild(userAnswer);
                
                // 正确答案
                const correctAnswer = document.createElement('div');
                correctAnswer.className = 'review-answer correct';
                correctAnswer.textContent = `正确答案: ${question.options[question.correctIndex]}`;
                reviewItem.appendChild(correctAnswer);
                
                // 解析
                const explanation = document.createElement('div');
                explanation.className = 'review-explanation';
                explanation.innerHTML = `<h4>解析：</h4><p>${question.explanation}</p>`;
                reviewItem.appendChild(explanation);
                
                reviewSection.appendChild(reviewItem);
            });
            
            // 切换显示
            questionContainer.style.display = 'none';
            resultContainer.style.display = 'block';
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }
        
        // 重新测试
        function restartTest() {
            startTest();
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
